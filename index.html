<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IMEC Corridor Embeddable Map</title>
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- IMEC Component Wrapper. Embedded perfectly in any host parent! -->
  <!-- Note: When embedded, copy only this #imec-map-module DOM structure into the host layout. -->
  <div id="imec-map-module" style="width: 100%; height: 100%; min-height: 600px; position: relative;">
    
    <aside class="sidebar">
      <div class="section">
        <h2>Infrastructure Layers</h2>
        
        <div class="toggle-group">
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-railway" checked>
            <span class="slider"></span>
          </label>
          <span class="toggle-label">IMEC Railway</span>
        </div>

      <div class="section">
        <h2>Geopolitics & Telecom</h2>
        
        <div class="toggle-group">
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-imec-cable" checked>
            <span class="slider"></span>
          </label>
          <span class="toggle-label">IMEC: Blue-Raman System</span>
        </div>

        <div class="toggle-group">
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-bri-cable" checked>
            <span class="slider"></span>
          </label>
          <span class="toggle-label">BRI: PEACE System (Competitor)</span>
        </div>
      </div>

        <div class="toggle-group">
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-datacenters" checked>
            <span class="slider"></span>
          </label>
          <span class="toggle-label">Data Centers</span>
        </div>
      </div>

      <div class="section">
        <h2>Infrastructure Nodes</h2>
        
        <div class="toggle-group">
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-cable-nodes" checked>
            <span class="slider"></span>
          </label>
          <span class="toggle-label">Landing Stations</span>
        </div>

        <div class="toggle-group">
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-railway-nodes" checked>
            <span class="slider"></span>
          </label>
          <span class="toggle-label">Railway Hubs</span>
        </div>
      </div>

      <div class="section">
        <h2>Regional Focus</h2>
        <button class="nav-btn" data-region="europe">European Terminals</button>
        <button class="nav-btn" data-region="middle-east">Middle East Transit</button>
        <button class="nav-btn" data-region="india">India Hub</button>
        <button class="nav-btn" data-region="overview">Corridor Overview</button>
      </div>
    </aside>

    <div class="map-container">
      <div id="map"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
